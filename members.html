<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>솔라러닝크루 - 회원 관리</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 추가 스타일: 탭 메뉴 */
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tab-item { padding: 0.6rem 1rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); white-space: nowrap; transition: all 0.2s; }
        .tab-item.active { background: var(--primary-color); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 모바일 대응 버튼 스타일 보완 */
        .btn-sm { padding: 0.4rem 0.6rem; font-size: 0.85rem; min-height: 36px; display: inline-flex; align-items: center; justify-content: center; }
        
        @media (max-width: 480px) {
            .data-table th, .data-table td { padding: 0.75rem 0.5rem; font-size: 0.85rem; }
            .btn-sm { padding: 0.3rem 0.5rem; font-size: 0.8rem; }
            .tabs { padding-left: 0.25rem; padding-right: 0.25rem; }
        }
    </style>
</head>
<body>
    <aside>
        <div class="sidebar-header">
            <a href="index.html">솔라러닝크루</a>
        </div>
        <nav>
            <a href="index.html" class="nav-item">
                <span class="nav-icon">🏠</span><span>홈</span>
            </a>
            <a href="history.html" class="nav-item">
                <span class="nav-icon">📊</span><span>회원 기록</span>
            </a>
            <a href="records.html" class="nav-item">
                <span class="nav-icon">📋</span><span>기록 등록</span>
            </a>
            <a href="members.html" class="nav-item active" id="nav-members">
                <span class="nav-icon">👤</span><span>회원 관리</span>
            </a>
        </nav>
    </aside>

    <main>
        <header style="flex-direction: column; align-items: stretch; gap: 1rem;">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <h1>회원 관리</h1>
                <div style="color: var(--text-muted); font-size: 0.85rem;" id="date-display">--</div>
            </div>
        </header>

        <!-- 탭 메뉴 -->
        <div class="tabs">
            <div class="tab-item active" onclick="switchTab('member-tab', this)">🏃 회원 목표 관리</div>
            <div class="tab-item" onclick="switchTab('account-tab', this)">🔐 앱 계정 관리</div>
        </div>

        <!-- 탭 1: 회원 목표 관리 -->
        <div id="member-tab" class="tab-content active">
            <div style="margin-bottom: 1rem;">
                <button class="btn btn-primary btn-lg" onclick="window.openModal()" style="width: 100%;">
                    <span style="font-size: 1.2rem; margin-right: 0.5rem;">+</span> 신규 회원 등록하기
                </button>
            </div>
            <div class="card">
                <h3 style="margin-bottom: 1.25rem;">회원별 목표 및 정보</h3>
                <div style="overflow-x: auto; margin: 0 -0.75rem;">
                    <table class="data-table" style="min-width: 480px; width: 100%;">
                        <thead>
                            <tr>
                                <th style="padding-left: 0.75rem; width: 40px;">#</th>
                                <th style="width: 80px;">회원이름</th>
                                <th style="width: 100px;">주간목표거리</th>
                                <th style="width: 100px;">평균페이스</th>
                                <th style="width: 60px;">주간횟수</th>
                                <th style="padding-right: 0.75rem; text-align: right;">관리</th>
                            </tr>
                        </thead>
                        <tbody id="member-list">
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 2rem; color: var(--text-muted);">데이터를 불러오는 중...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 탭 2: 앱 계정 관리 -->
        <div id="account-tab" class="tab-content">
            <div class="card">
                <h3 style="margin-bottom: 1.25rem;">가입된 앱 계정 목록</h3>
                <div style="overflow-x: auto; margin: 0 -0.75rem;">
                    <table class="data-table" style="min-width: 480px; width: 100%;">
                        <thead>
                            <tr>
                                <th style="padding-left: 0.75rem;">아이디(이름)</th>
                                <th>비밀번호</th>
                                <th style="width: 70px;">권한</th>
                                <th style="padding-right: 0.75rem; text-align: right;">관리</th>
                            </tr>
                        </thead>
                        <tbody id="account-list">
                            <tr>
                                <td colspan="4" style="text-align: center; padding: 2rem; color: var(--text-muted);">데이터를 불러오는 중...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal: Member Add/Edit (Existing) -->
    <div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">신규 회원 등록</h3>
                <button onclick="closeModal()" style="border:none; background:none; font-size: 1.75rem; cursor:pointer; color: var(--text-muted); padding: 0.5rem;">&times;</button>
            </div>
            <div class="modal-body">
                <form id="member-form" onsubmit="event.preventDefault();">
                    <input type="hidden" id="member-doc-id">
                    <div class="form-group">
                        <label for="name">회원이름</label>
                        <select id="name" class="form-control">
                            <option value="">회원을 선택하세요</option>
                        </select>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label for="minDistance">주간목표거리 (km)</label>
                            <input type="number" id="minDistance" class="form-control" placeholder="0.0" step="0.1" inputmode="decimal">
                        </div>
                        <div class="form-group">
                            <label>평균페이스 (분/초)</label>
                            <div style="display: flex; align-items: center; gap: 4px;">
                                <input type="number" id="paceMin" class="form-control" placeholder="분" min="0" inputmode="numeric" style="padding: 0.75rem 0.5rem; text-align: center;">
                                <span style="font-weight: bold; color: var(--text-muted);">'</span>
                                <input type="number" id="paceSec" class="form-control" placeholder="초" min="0" max="59" inputmode="numeric" style="padding: 0.75rem 0.5rem; text-align: center;">
                                <span style="font-weight: bold; color: var(--text-muted);">"</span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="weeklyCount">주간횟수 (회)</label>
                        <input type="number" id="weeklyCount" class="form-control" placeholder="0" inputmode="numeric">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal()">취소</button>
                <button class="btn btn-primary" id="save-btn" onclick="saveMember()">저장하기</button>
            </div>
        </div>
    </div>

    <!-- Modal: Account Edit (New) -->
    <div class="modal-overlay" id="account-modal-overlay" onclick="handleOverlayClick(event)">
        <div class="modal">
            <div class="modal-header">
                <h3>계정 정보 수정</h3>
                <button onclick="closeAccountModal()" style="border:none; background:none; font-size: 1.75rem; cursor:pointer; color: var(--text-muted); padding: 0.5rem;">&times;</button>
            </div>
            <div class="modal-body">
                <form id="account-form" onsubmit="event.preventDefault();">
                    <input type="hidden" id="account-doc-id">
                    <div class="form-group">
                        <label>아이디 (이름)</label>
                        <input type="text" id="account-name" class="form-control" readonly style="background-color: #f1f5f9;">
                    </div>
                    <div class="form-group">
                        <label>비밀번호</label>
                        <input type="text" id="account-pw" class="form-control" placeholder="새 비밀번호 입력">
                    </div>
                    <div class="form-group">
                        <label>권한 설정</label>
                        <select id="account-role" class="form-control">
                            <option value="user">일반 사용자 (user)</option>
                            <option value="admin">관리자 (admin)</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeAccountModal()">취소</button>
                <button class="btn btn-primary" onclick="saveAccount()">수정 완료</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        // --- [보안] 로그인 및 관리자 체크 스크립트 ---
        const checkAdminAuth = () => {
            const user = JSON.parse(localStorage.getItem('crew_user'));
            if (!user) {
                alert('로그인이 필요한 페이지입니다.');
                window.location.href = 'index.html';
                return null;
            }
            if (user.role !== 'admin') {
                alert('관리자만 접근할 수 있는 페이지입니다.');
                window.location.href = 'index.html';
                return null;
            }
            return user;
        };
        const currentUser = checkAdminAuth();
        if (!currentUser) throw new Error("Unauthorized");

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy, where, getDocs, getDoc } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1TE3jtcdcH6UvbfPGIy_IeaVivg2YvPA",
            authDomain: "run-app-268d5.firebaseapp.com",
            projectId: "run-app-268d5",
            storageBucket: "run-app-268d5.firebasestorage.app",
            messagingSenderId: "1064940196481",
            appId: "1:1064940196481:web:0408fd1fb557c4b2a2b380"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const membersCol = collection(db, "members");
        const usersCol = collection(db, "app_users");

        // 탭 전환 함수
        window.switchTab = (tabId, el) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        };

        // 오늘 날짜 표시
        const today = new Date();
        document.getElementById('date-display').innerText = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

        // [1] 회원 목록 실시간 렌더링
        onSnapshot(query(membersCol, orderBy("name")), (snapshot) => {
            const tbody = document.getElementById('member-list');
            tbody.innerHTML = '';
            if(snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem; color: var(--text-muted);">등록된 회원이 없습니다.</td></tr>';
                return;
            }
            let index = 1;
            snapshot.forEach((doc) => {
                const member = doc.data();
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="padding-left: 0.75rem; color: var(--text-muted); font-size: 0.75rem;">${index++}</td>
                    <td style="font-weight: 600; color: var(--text-main);">${member.name}</td>
                    <td><span style="font-weight: 700;">${member.minDistance || 0}</span> km</td>
                    <td>${member.paceMin || 0}'${String(member.paceSec || 0).padStart(2, '0')}"</td>
                    <td><span style="background: #f3f4f6; padding: 0.15rem 0.35rem; border-radius: 0.4rem; font-family: monospace; font-size: 0.8rem;">${member.weeklyCount || 0} 회</span></td>
                    <td style="padding-right: 0.75rem; text-align: right;">
                        <div style="display: flex; gap: 0.3rem; justify-content: flex-end;">
                            <button class="btn btn-outline btn-sm" onclick="window.editMember('${doc.id}', '${member.name}', ${member.minDistance || 0}, ${member.paceMin || 0}, ${member.paceSec || 0}, ${member.weeklyCount || 0})">수정</button>
                            <button class="btn btn-danger btn-sm" onclick="window.deleteMember('${doc.id}', '${member.name}')">삭제</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });

        // [2] 앱 계정 목록 실시간 렌더링
        onSnapshot(query(usersCol, orderBy("name")), (snapshot) => {
            const tbody = document.getElementById('account-list');
            const nameSelect = document.getElementById('name');
            const currentSelectedName = nameSelect.value;
            
            tbody.innerHTML = '';
            // 회원 이름 선택 드롭다운 초기화
            nameSelect.innerHTML = '<option value="">회원을 선택하세요</option>';
            
            if(snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 2rem; color: var(--text-muted);">가입된 계정이 없습니다.</td></tr>';
                return;
            }
            snapshot.forEach((doc) => {
                const user = doc.data();
                const tr = document.createElement('tr');
                const roleBadge = user.role === 'admin' ? 
                    '<span style="color: #ef4444; font-weight: 800;">관리자</span>' : 
                    '<span style="color: #64748b;">일반</span>';
                
                tr.innerHTML = `
                    <td style="padding-left: 0.75rem; font-weight: 600;">${user.name}</td>
                    <td style="font-family: monospace;">${user.password}</td>
                    <td>${roleBadge}</td>
                    <td style="padding-right: 0.75rem; text-align: right;">
                        <div style="display: flex; gap: 0.3rem; justify-content: flex-end;">
                            <button class="btn btn-outline btn-sm" onclick="window.openAccountModal('${doc.id}', '${user.name}', '${user.password}', '${user.role || 'user'}')">수정</button>
                            <button class="btn btn-danger btn-sm" onclick="window.deleteAccount('${doc.id}', '${user.name}')">삭제</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);

                // 회원 이름 선택 드롭다운 옵션 추가
                const option = document.createElement('option');
                option.value = user.name;
                option.textContent = user.name;
                nameSelect.appendChild(option);
            });

            // 이전에 선택되었던 값 복원 (수정 모드 대비)
            if (currentSelectedName) {
                nameSelect.value = currentSelectedName;
            }
        });

        // --- 회원 관리 로직 ---
        window.openModal = () => {
            document.getElementById('modal-title').innerText = '신규 회원 등록';
            document.getElementById('member-form').reset();
            document.getElementById('member-doc-id').value = '';
            const overlay = document.getElementById('modal-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
        };

        window.closeModal = () => {
            const overlay = document.getElementById('modal-overlay');
            overlay.classList.remove('active');
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
        };

        window.saveMember = async () => {
            const id = document.getElementById('member-doc-id').value;
            const name = document.getElementById('name').value;
            const minDistance = parseFloat(document.getElementById('minDistance').value) || 0;
            const paceMin = parseInt(document.getElementById('paceMin').value) || 0;
            const paceSec = parseInt(document.getElementById('paceSec').value) || 0;
            const weeklyCount = parseInt(document.getElementById('weeklyCount').value) || 0;

            if(!name) return alert('이름을 입력해 주세요.');
            try {
                if(id) {
                    // 수정 시에는 기존 기록 데이터 유지
                    const data = { name, minDistance, paceMin, paceSec, weeklyCount };
                    await updateDoc(doc(db, "members", id), data);
                    // 목표 변경 시 벌금 재계산
                    await recalculateMemberStats(id);
                } else {
                    // 신규 등록 시 모든 데이터 필드 초기화 (정렬 오류 방지)
                    const data = { 
                        name, 
                        minDistance, 
                        paceMin, 
                        paceSec, 
                        weeklyCount,
                        distance: 0,
                        count: 0,
                        totalTime: 0,
                        cumulativePenalty: 0,
                        pace: "0'00\""
                    };
                    await addDoc(membersCol, data);
                }
                window.closeModal();
            } catch (e) { alert("저장 오류: " + e.message); }
        };

        async function recalculateMemberStats(memberId) {
            const logsQuery = query(collection(db, "activity_logs"), where("memberId", "==", memberId));
            const snap = await getDocs(logsQuery);
            
            const memberRef = doc(db, "members", memberId);
            const memberDoc = await getDoc(memberRef);
            if (!memberDoc.exists()) return;

            const mData = memberDoc.data();
            const targetPaceSec = (mData.paceMin || 0) * 60 + (mData.paceSec || 0);
            const minDistance = mData.minDistance || 0;

            let totalDist = 0; 
            let totalSeconds = 0;
            let count = 0;
            let cumulativePenalty = 0;
            
            const weeklyData = {};
            let firstLogDate = null;

            snap.forEach(l => {
                const data = l.data();
                const dist = data.distance || 0;
                const logDateStr = data.date;
                const logDate = new Date(logDateStr + 'T00:00:00');
                
                if (!firstLogDate || logDate < firstLogDate) {
                    firstLogDate = new Date(logDate);
                }

                const d = new Date(logDate);
                const day = d.getDay();
                const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                const monday = new Date(d.setDate(diff));
                monday.setHours(0,0,0,0);
                const weekKey = monday.toISOString().split('T')[0];

                if (!weeklyData[weekKey]) {
                    weeklyData[weekKey] = { dist: 0, seconds: 0 };
                }
                weeklyData[weekKey].dist += dist;

                const paceMatch = (data.pace || "").match(/(\d+)'(\d+)"/);
                if (paceMatch) {
                    const mm = parseInt(paceMatch[1]);
                    const ss = parseInt(paceMatch[2]);
                    const currentLogPaceSec = mm * 60 + ss;
                    if (targetPaceSec > 0 && currentLogPaceSec > targetPaceSec) {
                        cumulativePenalty++;
                    }
                    const logTotalSec = currentLogPaceSec * dist;
                    weeklyData[weekKey].seconds += logTotalSec;
                    totalSeconds += logTotalSec;
                }
                totalDist += dist;
                count += 1;
            });

            if (firstLogDate) {
                const today = new Date();
                const tDay = today.getDay();
                const tDiff = today.getDate() - tDay + (tDay === 0 ? -6 : 1);
                const currentMonday = new Date(new Date(today).setDate(tDiff));
                currentMonday.setHours(0,0,0,0);

                const iterDate = new Date(firstLogDate);
                const iDay = iterDate.getDay();
                const iDiff = iterDate.getDate() - iDay + (iDay === 0 ? -6 : 1);
                iterDate.setDate(iDiff);
                iterDate.setHours(0,0,0,0);

                while (iterDate < currentMonday) {
                    const weekKey = iterDate.toISOString().split('T')[0];
                    const w = weeklyData[weekKey] || { dist: 0 };
                    if (w.dist < minDistance) {
                        cumulativePenalty++;
                    }
                    iterDate.setDate(iterDate.getDate() + 7);
                }
            }

            const avgPaceSeconds = totalDist > 0 ? totalSeconds / totalDist : 0;
            const avgPaceStr = formatPace(avgPaceSeconds);

            await updateDoc(memberRef, { 
                distance: Number(totalDist.toFixed(1)), 
                count: count,
                totalTime: Number((totalSeconds / 60).toFixed(1)),
                pace: avgPaceStr,
                cumulativePenalty: cumulativePenalty
            });
        }

        function formatPace(secondsPerKm) {
            if (!secondsPerKm || isNaN(secondsPerKm)) return "0'00\"";
            const m = Math.floor(secondsPerKm / 60);
            const s = Math.round(secondsPerKm % 60);
            const finalM = s === 60 ? m + 1 : m;
            const finalS = s === 60 ? 0 : s;
            return `${finalM}'${String(finalS).padStart(2, '0')}"`;
        }

        window.deleteMember = async (id, name) => {
            if(!id || !name) return alert('회원 정보가 올바르지 않습니다.');
            if(!confirm(`'${name}' 회원을 삭제하시겠습니까? 관련 앱 계정과 활동 기록도 모두 삭제됩니다.`)) return;
            try {
                // 1. 활동 기록 삭제 (해당 회원 ID와 일치하는 것만)
                const q = query(collection(db, "activity_logs"), where("memberId", "==", id));
                const snap = await getDocs(q);
                const batch = []; 
                snap.forEach(l => batch.push(deleteDoc(doc(db, "activity_logs", l.id))));
                await Promise.all(batch);

                // 2. 앱 계정 삭제 (이름이 정확히 일치하는 계정만)
                if (name.trim()) {
                    const uq = query(usersCol, where("name", "==", name.trim()));
                    const usnap = await getDocs(uq);
                    const ubatch = [];
                    usnap.forEach(u => ubatch.push(deleteDoc(doc(db, "app_users", u.id))));
                    await Promise.all(ubatch);
                }

                // 3. 회원 정보 삭제
                await deleteDoc(doc(db, "members", id));
                alert('회원 및 관련 데이터가 모두 삭제되었습니다.');
            } catch (e) { alert("삭제 오류: " + e.message); }
        };

        window.editMember = (id, name, minDistance, paceMin, paceSec, weeklyCount) => {
            document.getElementById('modal-title').innerText = '회원 정보 수정';
            document.getElementById('member-doc-id').value = id;
            document.getElementById('name').value = name;
            document.getElementById('minDistance').value = minDistance;
            document.getElementById('paceMin').value = paceMin;
            document.getElementById('paceSec').value = paceSec;
            document.getElementById('weeklyCount').value = weeklyCount;
            const overlay = document.getElementById('modal-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
        };

        // --- 앱 계정 관리 로직 ---
        window.openAccountModal = (id, name, pw, role) => {
            document.getElementById('account-doc-id').value = id;
            document.getElementById('account-name').value = name;
            document.getElementById('account-pw').value = pw;
            document.getElementById('account-role').value = role;
            const overlay = document.getElementById('account-modal-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
        };

        window.closeAccountModal = () => {
            const overlay = document.getElementById('account-modal-overlay');
            overlay.classList.remove('active');
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
        };

        window.saveAccount = async () => {
            const id = document.getElementById('account-doc-id').value;
            const password = document.getElementById('account-pw').value;
            const role = document.getElementById('account-role').value;

            if(!password) return alert('비밀번호를 입력해 주세요.');
            try {
                await updateDoc(doc(db, "app_users", id), { password, role });
                alert('계정 정보가 수정되었습니다.');
                window.closeAccountModal();
            } catch (e) { alert("수정 오류: " + e.message); }
        };

        window.deleteAccount = async (id, name) => {
            if(!id || !name) return alert('계정 정보가 올바르지 않습니다.');
            if(name === currentUser.name) return alert('본인 계정은 삭제할 수 없습니다.');
            if(!confirm(`'${name}' 계정을 삭제하시겠습니까? 관련된 회원 목표 정보와 모든 활동 기록도 함께 삭제됩니다.`)) return;
            try {
                // 1. 회원 정보 찾기 및 삭제 (이름 기준)
                if (name.trim()) {
                    const mq = query(membersCol, where("name", "==", name.trim()));
                    const msnap = await getDocs(mq);
                    
                    for (const mdoc of msnap.docs) {
                        const memberId = mdoc.id;
                        // 해당 회원의 활동 기록 삭제
                        const lq = query(collection(db, "activity_logs"), where("memberId", "==", memberId));
                        const lsnap = await getDocs(lq);
                        const lbatch = [];
                        lsnap.forEach(l => lbatch.push(deleteDoc(doc(db, "activity_logs", l.id))));
                        await Promise.all(lbatch);
                        
                        // 회원 문서 삭제
                        await deleteDoc(doc(db, "members", memberId));
                    }
                }

                // 2. 앱 계정 삭제
                await deleteDoc(doc(db, "app_users", id));
                alert('계정과 관련된 모든 데이터가 삭제되었습니다.');
            } catch (e) { alert("삭제 오류: " + e.message); }
        };

        window.handleOverlayClick = (e) => {
            if(e.target.classList.contains('modal-overlay')) {
                window.closeModal();
                window.closeAccountModal();
            }
        };
    </script>
</body>
</html>
