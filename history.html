<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>솔라러닝크루 - 회원 기록</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .week-container {
            margin-bottom: 2rem;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            overflow: hidden;
        }
        .week-header {
            background: #f1f5f9;
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .week-title {
            font-weight: 800;
            color: var(--primary-color);
            font-size: 0.95rem;
        }
        .week-summary {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }
        .week-summary b {
            color: var(--text-main);
            margin-left: 2px;
        }
        .history-item {
            border-bottom: 1px solid #f1f5f9;
            margin-bottom: 0 !important;
            border-radius: 0 !important;
            border-left: none !important;
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .history-list {
            max-height: 400px; /* Increased height */
        }
    </style>
</head>
<body>
    <aside>
        <div class="sidebar-header">
            <a href="index.html">솔라러닝크루</a>
        </div>
        <nav>
            <a href="index.html" class="nav-item">
                <span class="nav-icon">🏠</span><span>홈</span>
            </a>
            <a href="history.html" class="nav-item active">
                <span class="nav-icon">📊</span><span>회원 기록</span>
            </a>
            <a href="records.html" class="nav-item">
                <span class="nav-icon">📋</span><span>기록 등록</span>
            </a>
            <a href="members.html" class="nav-item" id="nav-members" style="display: none;">
                <span class="nav-icon">👤</span><span>회원 관리</span>
            </a>
        </nav>
    </aside>

    <main>
        <header>
            <h1>회원 기록 통계</h1>
            <div style="color: var(--text-muted); font-size: 0.85rem;" id="sync-status">실시간 연동 중</div>
        </header>

        <div class="card">
            <h3 style="margin-bottom: 1.25rem;">누적 활동 데이터</h3>
            <div style="overflow-x: auto; margin: 0 -0.75rem;">
                <table class="data-table" style="min-width: 550px; width: 100%;">
                    <thead>
                        <tr>
                            <th style="padding-left: 0.75rem; width: 80px;">이름</th>
                            <th style="width: 90px;">총거리</th>
                            <th style="width: 80px;">페이스</th>
                            <th style="width: 90px;">총시간</th>
                            <th style="width: 60px;">횟수</th>
                            <th style="padding-right: 0.75rem; text-align: right;">관리</th>
                        </tr>
                    </thead>
                    <tbody id="history-list">
                        <tr><td colspan="6" style="text-align: center; padding: 3rem; color: var(--text-muted);">불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- 1. 회원 상세 통계 팝업 -->
    <div class="modal-overlay" id="stats-modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>회원 활동 상세</h3>
                <button onclick="window.closeStatsModal()" style="border:none; background:none; font-size: 1.75rem; cursor:pointer; color: var(--text-muted);">&times;</button>
            </div>
            <div class="modal-body">
                <div id="stats-member-info" style="text-align: center; margin-bottom: 1rem;">
                    <div style="font-size: 1.3rem; font-weight: 800; color: var(--primary-color);" id="stats-member-name">--</div>
                    <div style="font-size: 0.85rem; color: var(--text-muted);">전체 활동 히스토리</div>
                </div>
                <div class="stats-grid">
                    <div class="stat-box">
                        <span class="label">이번 달 거리</span>
                        <span class="value" id="monthly-dist">0.0k</span>
                    </div>
                    <div class="stat-box">
                        <span class="label">이번주 총거리</span>
                        <span class="value" id="weekly-dist">0.0k</span>
                    </div>
                </div>
                <div style="font-weight: 700; font-size: 0.9rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 5px;">
                    📅 최근 활동 <small style="font-weight:400; color:var(--text-muted);">(주차별 구분)</small>
                </div>
                <div class="history-list" id="history-items">
                    <!-- 활동 이력 항목들이 여기에 생성됨 -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" style="width: 100%;" onclick="window.closeStatsModal()">닫기</button>
            </div>
        </div>
    </div>

    <!-- 2. 개별 활동 기록 수정 팝업 (기록 등록 카드와 동일 스타일) -->
    <div class="modal-overlay" id="edit-specific-log-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>런닝 기록 수정</h3>
                <button onclick="window.closeSpecificEditModal()" style="border:none; background:none; font-size: 1.75rem; cursor:pointer; color: var(--text-muted);">&times;</button>
            </div>
            <div class="modal-body">
                <form id="specific-log-form" onsubmit="event.preventDefault();">
                    <input type="hidden" id="spec-log-id">
                    <input type="hidden" id="spec-member-id">
                    <div class="form-group">
                        <label>운동 날짜</label>
                        <input type="date" id="spec-date" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>러닝 장소</label>
                        <select id="spec-location" class="form-control">
                            <option value="실외">실외 (Outdoor)</option>
                            <option value="실내">실내 (Indoor)</option>
                        </select>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>러닝 거리 (km)</label>
                            <input type="number" id="spec-distance" class="form-control" placeholder="0.0" step="0.1">
                        </div>
                        <div class="form-group">
                            <label>페이스</label>
                            <input type="text" id="spec-pace" class="form-control" placeholder="5'30\"">
                        </div>
                    </div>
                    <p style="font-size: 0.75rem; color: #6366f1; background: #f5f3ff; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #ddd6fe;">
                        💡 기록을 수정하면 해당 회원의 총 누적 거리와 횟수가 자동으로 다시 계산됩니다.
                    </p>
                </form>
            </div>
            <div class="modal-footer" style="display: flex; gap: 0.75rem;">
                <button class="btn btn-outline" onclick="window.closeSpecificEditModal()">취소</button>
                <button class="btn btn-primary" onclick="window.saveSpecificLogEdit()">저장하기</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        // [보안] 로그인 및 메뉴 권한 체크
        const checkAuth = () => {
            const user = JSON.parse(localStorage.getItem('crew_user'));
            if (!user) { alert('로그인이 필요합니다.'); window.location.href = 'index.html'; return null; }
            if (user.role === 'admin') {
                const navMembers = document.getElementById('nav-members');
                if (navMembers) navMembers.style.display = 'flex';
            }
            return user;
        };
        const currentUser = checkAuth();
        if (!currentUser) throw new Error("Unauthorized");

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy, where, getDocs } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1TE3jtcdcH6UvbfPGIy_IeaVivg2YvPA",
            authDomain: "run-app-268d5.firebaseapp.com",
            projectId: "run-app-268d5",
            storageBucket: "run-app-268d5.firebasestorage.app",
            messagingSenderId: "1064940196481",
            appId: "1:1064940196481:web:0408fd1fb557c4b2a2b380"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const membersCol = collection(db, "members");
        const logsCol = collection(db, "activity_logs");

        // 1. 실시간 누계 데이터 렌더링
        onSnapshot(query(membersCol, orderBy("name")), (snapshot) => {
            const tbody = document.getElementById('history-list');
            const thead = document.querySelector('thead tr');
            tbody.innerHTML = '';
            
            if (currentUser.role !== 'admin') {
                const manageHeader = thead.querySelector('th:last-child');
                if (manageHeader) manageHeader.style.display = 'none';
            }

            snapshot.forEach((docSnap) => {
                const m = docSnap.data();
                const totalMinutes = m.totalTime || 0;
                const h = Math.floor(totalMinutes / 60);
                const min = Math.round(totalMinutes % 60);
                const timeStr = h > 0 ? `${h}시간 ${min}분` : `${min}분`;

                const tr = document.createElement('tr');
                let rowHtml = `
                    <td style="padding-left: 0.75rem; font-weight: 700; color: var(--primary-color); cursor: pointer;" onclick="window.showStats('${docSnap.id}', '${m.name}')">${m.name}</td>
                    <td><span style="color: var(--text-main); font-weight: 800;">${m.distance || 0}</span> km</td>
                    <td><span style="font-family: monospace; font-size: 0.85rem;">${m.pace || "0'00\""}</span></td>
                    <td style="font-size: 0.85rem;">${timeStr}</td>
                    <td>${m.count || 0} 회</td>
                `;

                if (currentUser.role === 'admin') {
                    rowHtml += `
                        <td style="padding-right: 0.75rem; text-align: right;">
                            <span style="color:var(--text-muted); font-size:0.75rem;">(상세에서 수정)</span>
                        </td>
                    `;
                }
                tr.innerHTML = rowHtml;
                tbody.appendChild(tr);
            });
            document.getElementById('sync-status').innerText = "실시간 연동 완료";
        });

        // 2. 회원 상세 통계 팝업 열기
        window.showStats = async (memberId, memberName) => {
            document.getElementById('stats-member-name').innerText = memberName;
            const historyContainer = document.getElementById('history-items');
            historyContainer.innerHTML = '<div style="text-align:center; padding:2rem; color:var(--text-muted);">활동 내역 로딩 중...</div>';
            
            const overlay = document.getElementById('stats-modal-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);

            try {
                const q = query(logsCol, where("memberId", "==", memberId));
                const querySnapshot = await getDocs(q);
                
                let monthlyDist = 0; 
                let thisWeekDist = 0;
                
                const now = new Date();
                const oneMonthAgo = new Date(); oneMonthAgo.setMonth(now.getMonth() - 1);
                
                // 이번주 월요일 00:00:00 계산
                const today = new Date();
                const day = today.getDay();
                const diffToMonday = today.getDate() - day + (day === 0 ? -6 : 1);
                const thisMonday = new Date(new Date(today).setDate(diffToMonday));
                thisMonday.setHours(0,0,0,0);
                
                const logs = [];
                querySnapshot.forEach((d) => logs.push({ id: d.id, ...d.data() }));
                logs.sort((a, b) => new Date(b.date) - new Date(a.date));

                historyContainer.innerHTML = '';
                if(logs.length === 0) {
                    historyContainer.innerHTML = '<div style="text-align:center; padding:2rem; color:var(--text-muted);">아직 기록이 없습니다.</div>';
                    return;
                }

                // 주차별 그룹화
                const groups = {};
                logs.forEach((log) => {
                    const logDate = new Date(log.date);
                    if (logDate >= oneMonthAgo) monthlyDist += (log.distance || 0);
                    if (logDate >= thisMonday) thisWeekDist += (log.distance || 0);

                    // 해당 날짜의 월요일 찾기
                    const d = new Date(log.date);
                    const lDay = d.getDay();
                    const lDiff = d.getDate() - lDay + (lDay === 0 ? -6 : 1);
                    const monday = new Date(new Date(d).setDate(lDiff));
                    monday.setHours(0,0,0,0);
                    const key = monday.toISOString().split('T')[0];

                    if (!groups[key]) {
                        groups[key] = {
                            monday: monday,
                            logs: [],
                            totalDist: 0,
                            totalSeconds: 0
                        };
                    }
                    groups[key].logs.push(log);
                    groups[key].totalDist += (log.distance || 0);
                    
                    const paceMatch = log.pace.match(/(\d+)'(\d+)"/);
                    if (paceMatch) {
                        const m = parseInt(paceMatch[1]);
                        const s = parseInt(paceMatch[2]);
                        const secondsPerKm = m * 60 + s;
                        groups[key].totalSeconds += secondsPerKm * (log.distance || 0);
                    }
                });

                const sortedKeys = Object.keys(groups).sort((a, b) => b.localeCompare(a));

                sortedKeys.forEach((key) => {
                    const group = groups[key];
                    const weekLabel = getWeekOfMonthLabel(group.monday);
                    const avgPaceSeconds = group.totalDist > 0 ? group.totalSeconds / group.totalDist : 0;
                    const avgPaceStr = formatPace(avgPaceSeconds);

                    const weekContainer = document.createElement('div');
                    weekContainer.className = 'week-container';
                    
                    weekContainer.innerHTML = `
                        <div class="week-header">
                            <span class="week-title">${weekLabel}</span>
                            <span class="week-summary">합계: <b>${group.totalDist.toFixed(1)}km</b> | 평단: <b>${avgPaceStr}</b></span>
                        </div>
                        <div class="week-logs"></div>
                    `;
                    // ... (rest of the logs rendering logic)

                    const logsList = weekContainer.querySelector('.week-logs');
                    
                    group.logs.forEach((log) => {
                        const item = document.createElement('div');
                        item.className = `history-item`;
                        item.style.flexDirection = 'column';
                        item.style.alignItems = 'flex-start';

                        let actionsHtml = '';
                        if (currentUser.role === 'admin') {
                            actionsHtml = `
                                <div style="display: flex; gap: 0.5rem; margin-top: 0.75rem; width: 100%;">
                                    <button class="btn btn-danger btn-sm" style="flex: 1; min-height: 40px; font-size: 0.9rem; padding: 0;" onclick="window.deleteSpecificLog('${log.id}', '${memberId}')">삭제</button>
                                </div>
                            `;
                        }

                        item.innerHTML = `
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; padding: 0.75rem 1rem;">
                                <div class="date" style="font-size: 0.95rem;">${log.date} <small style="color:#64748b;">[${log.location || '실외'}]</small></div>
                                <div class="metrics" style="text-align: right;">
                                    <span class="dist" style="display:block; font-size: 1rem; font-weight: 800;">${log.distance}km</span>
                                    <div class="pace" style="font-size: 0.8rem;">${log.pace}</div>
                                </div>
                            </div>
                            ${actionsHtml ? `<div style="padding: 0 1rem 0.75rem 1rem;">${actionsHtml}</div>` : ''}
                        `;
                        logsList.appendChild(item);
                    });

                    historyContainer.appendChild(weekContainer);
                });

                document.getElementById('monthly-dist').innerText = monthlyDist.toFixed(1) + "k";
                document.getElementById('weekly-dist').innerText = thisWeekDist.toFixed(1) + "k";
            } catch (e) { console.error(e); }
        };

        function getWeekOfMonthLabel(monday) {
            const m = monday.getMonth() + 1;
            const weekNum = Math.floor((monday.getDate() - 1) / 7) + 1;
            return `${m}월 ${weekNum}주차`;
        }

        function formatPace(secondsPerKm) {
            if (!secondsPerKm || isNaN(secondsPerKm)) return "0'00\"";
            const m = Math.floor(secondsPerKm / 60);
            const s = Math.round(secondsPerKm % 60);
            const finalM = s === 60 ? m + 1 : m;
            const finalS = s === 60 ? 0 : s;
            return `${finalM}'${String(finalS).padStart(2, '0')}"`;
        }

        // 3. 개별 기록 수정 팝업 제어
        window.openSpecificEditModal = (logId, memberId, date, distance, pace, location) => {
            // 통계 팝업은 그대로 두고 그 위에 수정 팝업을 띄움
            document.getElementById('spec-log-id').value = logId;
            document.getElementById('spec-member-id').value = memberId;
            document.getElementById('spec-date').value = date;
            document.getElementById('spec-distance').value = distance;
            document.getElementById('spec-pace').value = pace;
            document.getElementById('spec-location').value = location;

            const overlay = document.getElementById('edit-specific-log-modal');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
        };

        window.closeSpecificEditModal = () => {
            const overlay = document.getElementById('edit-specific-log-modal');
            overlay.classList.remove('active');
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
        };

        window.saveSpecificLogEdit = async () => {
            const logId = document.getElementById('spec-log-id').value;
            const memberId = document.getElementById('spec-member-id').value;
            const date = document.getElementById('spec-date').value;
            const distance = parseFloat(document.getElementById('spec-distance').value);
            const pace = document.getElementById('spec-pace').value;
            const location = document.getElementById('spec-location').value;

            if(!date || isNaN(distance) || !pace) return alert('모든 정보를 정확히 입력해 주세요.');

            try {
                // 1. 개별 로그 업데이트
                await updateDoc(doc(db, "activity_logs", logId), { date, distance, pace, location });
                
                // 2. 누계 데이터 재계산 및 업데이트
                await recalculateMemberStats(memberId);
                
                alert('기록이 수정되었습니다.');
                window.closeSpecificEditModal();
                // 통계 팝업의 데이터도 최신화하기 위해 다시 로드
                window.showStats(memberId, document.getElementById('stats-member-name').innerText);
            } catch (e) { alert('수정 중 오류 발생'); }
        };

        window.deleteSpecificLog = async (logId, memberId) => {
            if (!confirm('이 기록을 정말 삭제하시겠습니까?')) return;
            try {
                await deleteDoc(doc(db, "activity_logs", logId));
                await recalculateMemberStats(memberId);
                alert('삭제되었습니다.');
                window.showStats(memberId, document.getElementById('stats-member-name').innerText);
            } catch (e) { alert('삭제 중 오류 발생'); }
        };

        async function recalculateMemberStats(memberId) {
            const q = query(logsCol, where("memberId", "==", memberId));
            const snap = await getDocs(q);
            
            let totalDist = 0; 
            let totalSeconds = 0;
            let count = 0;
            
            snap.forEach(l => {
                const data = l.data();
                const dist = data.distance || 0;
                totalDist += dist;
                count += 1;
                
                // 페이스 문자열(M'SS")에서 초 계산
                const paceMatch = (data.pace || "").match(/(\d+)'(\d+)"/);
                if (paceMatch) {
                    const m = parseInt(paceMatch[1]);
                    const s = parseInt(paceMatch[2]);
                    // 거리 * 초/km = 해당 활동의 총 소요 시간(초)
                    totalSeconds += (m * 60 + s) * dist;
                }
            });
            
            const avgPaceSeconds = totalDist > 0 ? totalSeconds / totalDist : 0;
            const avgPaceStr = formatPace(avgPaceSeconds);
            const totalTimeMinutes = totalSeconds / 60;

            await updateDoc(doc(db, "members", memberId), { 
                distance: Number(totalDist.toFixed(1)), 
                count: count,
                totalTime: Number(totalTimeMinutes.toFixed(1)),
                pace: avgPaceStr
            });
        }

        window.closeStatsModal = () => {
            const overlay = document.getElementById('stats-modal-overlay');
            overlay.classList.remove('active');
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
        }

        // 배경 클릭 시 닫기 (이중 팝업 대응)
        window.handleOverlayClick = (e) => {
            if(e.target.id === 'edit-specific-log-modal') window.closeSpecificEditModal();
            else if(e.target.id === 'stats-modal-overlay') window.closeStatsModal();
        };
    </script>
</body>
</html>
