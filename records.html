<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 대시보드 - 기록 등록 (Firebase)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside>
        <div class="sidebar-header">
            <a href="index.html">솔라러닝크루</a>
        </div>
        <nav>
            <a href="index.html" class="nav-item">
                <span class="nav-icon">🏠</span><span>홈</span>
            </a>
            <a href="history.html" class="nav-item">
                <span class="nav-icon">📊</span><span>회원 기록</span>
            </a>
            <a href="records.html" class="nav-item active">
                <span class="nav-icon">📋</span><span>기록 등록</span>
            </a>
            <a href="members.html" class="nav-item" id="nav-members" style="display: none;">
                <span class="nav-icon">👤</span><span>회원 관리</span>
            </a>
        </nav>
    </aside>

    <main>
        <header>
            <h1>기록 등록</h1>
            <div style="color: var(--text-muted); font-size: 0.875rem;">회원 관리 페이지의 모든 회원이 여기에 표시됩니다.</div>
        </header>

        <div class="card">
            <h3 style="margin-bottom: 1.25rem;">기록 추가 대상자</h3>
            <div style="overflow-x: auto; margin: 0 -0.75rem;">
                <table class="data-table" style="min-width: 320px; width: 100%;">
                    <thead>
                        <tr>
                            <th style="padding-left: 0.75rem; width: 50px;">순번</th>
                            <th>회원이름</th>
                            <th style="padding-right: 0.75rem; text-align: right;">작업</th>
                        </tr>
                    </thead>
                    <tbody id="member-record-list">
                        <tr>
                            <td colspan="3" style="text-align: center; padding: 2rem; color: var(--text-muted);">
                                데이터를 불러오는 중...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Registration Modal -->
    <div class="modal-overlay" id="record-modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>런닝 기록 등록</h3>
                <button onclick="window.closeRecordModal()" style="border:none; background:none; font-size: 1.75rem; cursor:pointer; color: var(--text-muted); padding: 0.5rem;">&times;</button>
            </div>
            <div class="modal-body">
                <div id="target-member-info" style="margin-bottom: 1.5rem; padding: 1.25rem; background: #f8fafc; border-radius: 1rem; border: 1px solid #e2e8f0; text-align: center;">
                    <!-- 회원 이름 표시 -->
                </div>
                <form id="record-form">
                    <input type="hidden" id="target-member-id">
                    <div class="form-group">
                        <label>운동 날짜</label>
                        <input type="date" id="record-date" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>러닝 장소</label>
                        <select id="run-location" class="form-control">
                            <option value="실외">실외 (Outdoor)</option>
                            <option value="실내">실내 (Indoor)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>러닝 거리 (km)</label>
                        <input type="number" id="new-distance" class="form-control" placeholder="0.0" step="0.1" oninput="calculatePace()">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>런닝 시간 (분)</label>
                            <input type="number" id="run-min" class="form-control" placeholder="0" min="0" oninput="calculatePace()">
                        </div>
                        <div class="form-group">
                            <label>런닝 시간 (초)</label>
                            <input type="number" id="run-sec" class="form-control" placeholder="0" min="0" max="59" oninput="calculatePace()">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>계산된 페이스 (자동)</label>
                        <input type="text" id="new-pace" class="form-control" placeholder="분'초\"" readonly style="background-color: #f1f5f9; font-weight: 700; color: var(--primary-color);">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="window.closeRecordModal()">닫기</button>
                <button class="btn btn-primary" onclick="window.submitRecord()">기록 저장하기</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        // --- [보안] 로그인 체크 및 메뉴 제어 ---
        const checkAuth = () => {
            const user = JSON.parse(localStorage.getItem('crew_user'));
            if (!user) {
                alert('로그인이 필요합니다.');
                window.location.href = 'index.html';
                return null;
            }
            // 관리자일 때만 회원관리 메뉴 표시
            if (user.role === 'admin') {
                const navMembers = document.getElementById('nav-members');
                if (navMembers) navMembers.style.display = 'flex';
            }
            return user;
        };
        const currentUser = checkAuth();
        if (!currentUser) throw new Error("Unauthorized");

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc, addDoc, serverTimestamp, query, where } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔥 회원 관리(members.html)와 반드시 동일한 설정값을 넣어주세요!
        const firebaseConfig = {
            apiKey: "AIzaSyD1TE3jtcdcH6UvbfPGIy_IeaVivg2YvPA",
            authDomain: "run-app-268d5.firebaseapp.com",
            projectId: "run-app-268d5",
            storageBucket: "run-app-268d5.firebasestorage.app",
            messagingSenderId: "1064940196481",
            appId: "1:1064940196481:web:0408fd1fb557c4b2a2b380"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const membersCol = collection(db, "members");

        // 권한에 따른 쿼리 설정: 관리자면 전체, 일반 유저면 본인 이름만
        let memberQuery = membersCol;
        if (currentUser.role !== 'admin') {
            memberQuery = query(membersCol, where("name", "==", currentUser.name));
        }

        // 회원 목록을 실시간으로 가져와서 표에 표시
        onSnapshot(memberQuery, (snapshot) => {
            console.log("파이어베이스 데이터 수신중...");
            const tbody = document.getElementById('member-record-list');
            tbody.innerHTML = '';
            
            if(snapshot.empty) {
                const msg = currentUser.role === 'admin' ? 
                    '회원 관리 페이지에서 회원을 먼저 등록해 주세요.' : 
                    '등록된 회원 정보가 없습니다. 관리자에게 문의하세요.';
                tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; padding: 3rem; color: var(--text-muted);">${msg}</td></tr>`;
                return;
            }

            let index = 1;
            snapshot.forEach((doc) => {
                const member = doc.data();
                const tr = document.createElement('tr');
                
                tr.innerHTML = `
                    <td style="padding-left: 0.75rem; color: var(--text-muted); font-size: 0.75rem;">${index++}</td>
                    <td style="font-weight: 700; font-size: 0.95rem;">${member.name}</td>
                    <td style="padding-right: 0.75rem; text-align: right;">
                        <button class="btn btn-primary btn-sm" style="padding: 0.35rem 0.7rem;" onclick="window.openRecordModal('${doc.id}', '${member.name}')">기록 등록</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            console.log(`${snapshot.size}명의 데이터를 불러왔습니다.`);
        }, (error) => {
            console.error("데이터 로드 에러:", error);
            document.getElementById('member-record-list').innerHTML = `<tr><td colspan="3" style="text-align: center; color: red;">에러 발생: ${error.message}</td></tr>`;
        });

        // 오늘 날짜 설정
        function setTodayDate() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            document.getElementById('record-date').value = `${year}-${month}-${day}`;
        }
        setTodayDate();

        // 실시간 페이스 계산
        window.calculatePace = () => {
            const dist = parseFloat(document.getElementById('new-distance').value);
            const min = parseInt(document.getElementById('run-min').value) || 0;
            const sec = parseInt(document.getElementById('run-sec').value) || 0;

            if (!dist || dist <= 0 || (min === 0 && sec === 0)) {
                document.getElementById('new-pace').value = "";
                return;
            }

            const totalSeconds = (min * 60) + sec;
            const secondsPerKm = totalSeconds / dist;
            
            const paceMin = Math.floor(secondsPerKm / 60);
            const paceSec = Math.round(secondsPerKm % 60);
            
            // 페이스가 60초가 될 경우 1분으로 올림 처리
            const finalMin = paceSec === 60 ? paceMin + 1 : paceMin;
            const finalSec = paceSec === 60 ? 0 : paceSec;

            document.getElementById('new-pace').value = `${finalMin}'${String(finalSec).padStart(2, '0')}"`;
        };

        // 팝업 열기
        window.openRecordModal = (id, name) => {
            setTodayDate();
            document.getElementById('target-member-id').value = id;
            document.getElementById('target-member-info').innerHTML = `
                <div style="font-size: 0.85rem; color: #64748b; margin-bottom: 0.25rem;">선택된 회원</div>
                <div style="font-size: 1.25rem; font-weight: 800; color: var(--primary-color);">${name}</div>
            `;
            const overlay = document.getElementById('record-modal-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
        };

        // 팝업 닫기
        window.closeRecordModal = () => {
            const overlay = document.getElementById('record-modal-overlay');
            overlay.classList.remove('active');
            setTimeout(() => { 
                overlay.style.display = 'none'; 
                document.getElementById('record-form').reset();
            }, 300);
        };

        // 기록 저장 로직
        window.submitRecord = async () => {
            const memberId = document.getElementById('target-member-id').value;
            const newDist = parseFloat(document.getElementById('new-distance').value);
            const newMin = parseInt(document.getElementById('run-min').value) || 0;
            const newSec = parseInt(document.getElementById('run-sec').value) || 0;
            const newPace = document.getElementById('new-pace').value;
            const date = document.getElementById('record-date').value;
            const location = document.getElementById('run-location').value;

            if(!newDist || !newPace || !date) {
                alert('거리와 시간을 정확히 입력해 주세요. 페이스가 자동으로 계산되어야 합니다.');
                return;
            }

            const additionalMinutes = newMin + (newSec / 60);

            try {
                const memberRef = doc(db, "members", memberId);
                const memberDoc = await getDoc(memberRef);
                
                if (memberDoc.exists()) {
                    const current = memberDoc.data();
                    
                    // 기존 값에 더하기 (누적 업데이트)
                    await updateDoc(memberRef, {
                        distance: Number(((current.distance || 0) + newDist).toFixed(1)),
                        count: (current.count || 0) + 1,
                        totalTime: Number(((current.totalTime || 0) + additionalMinutes).toFixed(1)),
                        pace: newPace
                    });

                    // 히스토리 로그 기록 (activity_logs 컬렉션)
                    await addDoc(collection(db, "activity_logs"), {
                        memberId: memberId,
                        memberName: current.name,
                        distance: newDist,
                        pace: newPace,
                        date: date,
                        location: location, // 실외/실내 정보 추가
                        timestamp: serverTimestamp()
                    });

                    alert(`${current.name}님의 기록이 저장되었습니다.`);
                    window.closeRecordModal();
                    document.getElementById('record-form').reset();
                    document.getElementById('record-date').valueAsDate = new Date();
                }
            } catch (e) {
                console.error("기록 저장 중 오류:", e);
                alert("저장 실패: " + e.message);
            }
        };

        // 배경 클릭 시 팝업 닫기
        document.getElementById('record-modal-overlay').onclick = (e) => {
            if(e.target.id === 'record-modal-overlay') window.closeRecordModal();
        };
    </script>
</body>
</html>
